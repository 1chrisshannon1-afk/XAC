# Deploy new revision at 0% traffic. Migrations run before this in the caller.
on:
  workflow_call:
    inputs:
      project-id:
        type: string
        required: true
      region:
        type: string
        default: us-central1
      service-name:
        type: string
        required: true
      image-uri:
        type: string
        required: true
      environment:
        type: string
        default: staging
      revision-suffix:
        type: string
        required: true
    outputs:
      revision-name:
        value: ${{ jobs.deploy.outputs.revision-name }}
      revision-url:
        value: ${{ jobs.deploy.outputs.revision-url }}

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Deploy at 0% traffic
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      revision-name: ${{ steps.deploy.outputs.revision-name }}
      revision-url: ${{ steps.deploy.outputs.revision-url }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      - name: Deploy new revision at 0% traffic
        id: deploy
        run: |
          set -e
          gcloud run deploy ${{ inputs.service-name }} \
            --image="${{ inputs.image-uri }}" \
            --region="${{ inputs.region }}" \
            --project="${{ inputs.project-id }}" \
            --revision-suffix="${{ inputs.revision-suffix }}" \
            --no-traffic \
            --tag="canary" \
            --set-env-vars="ENVIRONMENT=${{ inputs.environment }},GIT_COMMIT=${{ inputs.revision-suffix }}" \
            --quiet
          REVISION_URL=$(gcloud run services describe ${{ inputs.service-name }} \
            --region="${{ inputs.region }}" --project="${{ inputs.project-id }}" \
            --format='value(status.url)' 2>/dev/null)
          echo "revision-name=${{ inputs.service-name }}-${{ inputs.revision-suffix }}" >> $GITHUB_OUTPUT
          echo "revision-url=${REVISION_URL}" >> $GITHUB_OUTPUT
