# Traffic shift: canary (10%) -> bake 15-30 min with HTTP health check -> 100%. Success notification on cutover.
# Bake default 15 min (staging); use 20-30 for production. Fixed HTTP-based health check.
on:
  workflow_call:
    inputs:
      project-id:
        type: string
        required: true
      region:
        type: string
        default: us-central1
      service-name:
        type: string
        required: true
      revision-name:
        type: string
        required: true
      canary-percentage:
        type: number
        default: 10
      canary-bake-minutes:
        description: "15-30 min for meaningful canary; 5 min is not statistically meaningful"
        type: number
        default: 15
      max-health-failures:
        type: number
        default: 2
      environment:
        type: string
        default: staging

permissions:
  contents: read
  id-token: write

jobs:
  canary:
    name: Traffic shift — canary ${{ inputs.canary-percentage }}%
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      canary-healthy: ${{ steps.health.outputs.healthy }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      - name: Shift ${{ inputs.canary-percentage }}% traffic to new revision
        run: |
          gcloud run services update-traffic ${{ inputs.service-name }} \
            --region="${{ inputs.region }}" \
            --project="${{ inputs.project-id }}" \
            --to-revisions="${{ inputs.revision-name }}=${{ inputs.canary-percentage }}"
      - name: Bake and health check (HTTP-based, ${{ inputs.canary-bake-minutes }} min)
        id: health
        env:
          BAKE_MIN: ${{ inputs.canary-bake-minutes }}
          MAX_FAIL: ${{ inputs.max-health-failures }}
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ inputs.service-name }} \
            --region="${{ inputs.region }}" --project="${{ inputs.project-id }}" \
            --format='value(status.url)')
          if [ -f scripts/canary-health-check.sh ]; then
            chmod +x scripts/canary-health-check.sh
            ./scripts/canary-health-check.sh "$SERVICE_URL" "$BAKE_MIN" "$MAX_FAIL" /health
          else
            FAILED=0
            TOTAL=$(( BAKE_MIN * 2 ))
            for i in $(seq 1 $TOTAL); do
              HTTP=$(curl -s -o /dev/null -w "%{http_code}" "$SERVICE_URL/health" --max-time 10 || echo "000")
              [ "$HTTP" != "200" ] && FAILED=$((FAILED+1)) && echo "Attempt $i: HTTP $HTTP"
              [ $FAILED -gt $MAX_FAIL ] && echo "healthy=false" >> $GITHUB_OUTPUT && exit 1
              sleep 30
            done
          fi
          echo "healthy=true" >> $GITHUB_OUTPUT

  cutover:
    name: Traffic shift — 100%
    needs: canary
    if: needs.canary.outputs.canary-healthy == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      - name: Shift 100% traffic to new revision
        run: |
          gcloud run services update-traffic ${{ inputs.service-name }} \
            --region="${{ inputs.region }}" \
            --project="${{ inputs.project-id }}" \
            --to-revisions="${{ inputs.revision-name }}=100"
      - name: Success — record in summary
        run: |
          echo "## Deployment complete" >> $GITHUB_STEP_SUMMARY
          echo "| Revision | ${{ inputs.revision-name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Traffic | 100% |" >> $GITHUB_STEP_SUMMARY
          echo "Success notification (Slack/etc.) should be sent here when notify action is configured."
