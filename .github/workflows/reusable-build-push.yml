# Build and push image to Artifact Registry.
on:
  workflow_call:
    inputs:
      project-id:
        type: string
        required: true
      region:
        type: string
        default: us-central1
      repo-name:
        type: string
        required: true
      service-name:
        type: string
        required: true
      dockerfile:
        type: string
        default: Dockerfile
    outputs:
      image-uri:
        value: ${{ jobs.build.outputs.image-uri }}
      image-tag:
        value: ${{ jobs.build.outputs.image-tag }}

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  build:
    name: Build and push image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      image-uri: ${{ steps.meta.outputs.image-uri }}
      image-tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ inputs.region }}-docker.pkg.dev --quiet
      - name: Build and push
        id: meta
        run: |
          TAG=$(git rev-parse --short HEAD)
          IMAGE="${{ inputs.region }}-docker.pkg.dev/${{ inputs.project-id }}/${{ inputs.repo-name }}/${{ inputs.service-name }}"
          docker build -f ${{ inputs.dockerfile }} -t "$IMAGE:$TAG" -t "$IMAGE:latest" .
          docker push "$IMAGE:$TAG"
          docker push "$IMAGE:latest"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "image-uri=$IMAGE:$TAG" >> $GITHUB_OUTPUT
