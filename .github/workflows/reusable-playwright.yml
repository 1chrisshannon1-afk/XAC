# Playwright E2E — fixed 3 shards (no dynamic shard-count; GitHub Actions cannot generate matrix from input).
on:
  workflow_call:
    inputs:
      revision-url:
        type: string
        required: true
      playwright-dir:
        type: string
        required: true
      browsers:
        type: string
        default: "chromium"
      node-version:
        type: string
        default: "20"

jobs:
  playwright:
    name: "Playwright shard ${{ matrix.shard }}/3"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm
          cache-dependency-path: ${{ inputs.playwright-dir }}/package-lock.json
      - name: Install dependencies
        working-directory: ${{ inputs.playwright-dir }}
        run: npm ci
      - name: Install Playwright browsers
        working-directory: ${{ inputs.playwright-dir }}
        run: npx playwright install --with-deps ${{ inputs.browsers }}
      - name: Run Playwright tests
        working-directory: ${{ inputs.playwright-dir }}
        run: npx playwright test --project=${{ inputs.browsers }} --shard=${{ matrix.shard }}/3 --reporter=html,github
        env:
          BASE_URL: ${{ inputs.revision-url }}
          CI: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: ${{ inputs.playwright-dir }}/playwright-report/
          retention-days: 7
