# Static checks: compileall, ruff check, ruff format, mypy (non-blocking by default).
on:
  workflow_call:
    inputs:
      python-version:
        type: string
        default: "3.11"
      compileall-targets:
        description: "Space-separated paths for python -m compileall"
        type: string
        required: true
      ruff-excludes:
        description: "Comma-separated ruff --exclude patterns"
        type: string
        default: ""
      mypy-target:
        description: "Path for mypy"
        type: string
        required: true
      mypy-config:
        description: "mypy config file"
        type: string
        default: "mypy.ini"
      mypy-blocking:
        description: "Fail CI on mypy errors (false = warn only)"
        type: boolean
        default: false

jobs:
  static-checks:
    name: Static Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "ruff>=0.14.0" mypy types-requests
      - name: Compile Python
        run: python -m compileall -q ${{ inputs.compileall-targets }}
      - name: Ruff check
        run: |
          EXCLUDE_ARGS=""
          if [ -n "${{ inputs.ruff-excludes }}" ]; then
            IFS=',' read -ra EXCLUDES <<< "${{ inputs.ruff-excludes }}"
            for exc in "${EXCLUDES[@]}"; do
              EXCLUDE_ARGS="$EXCLUDE_ARGS --exclude=$exc"
            done
          fi
          ruff check $EXCLUDE_ARGS --output-format=github .
      - name: Ruff format check
        run: ruff format --check --diff .
      - name: Mypy
        id: mypy
        continue-on-error: true
        run: mypy ${{ inputs.mypy-target }} --config-file=${{ inputs.mypy-config }}
      - name: Mypy result
        if: steps.mypy.outcome == 'failure'
        run: |
          if [ "${{ inputs.mypy-blocking }}" = "true" ]; then
            echo "::error::mypy found type errors (blocking)"
            exit 1
          else
            echo "::warning::mypy found type errors (non-blocking)"
          fi
