# Unit and integration tests with matrix strategy.
# Caller passes test sets as JSON arrays; each element runs in parallel.
on:
  workflow_call:
    inputs:
      python-version:
        type: string
        default: "3.11"
      unit-test-matrix:
        description: 'JSON array: [{"set_name":"...", "test_paths":"..."}]'
        type: string
        required: true
      integration-test-matrix:
        description: 'JSON array: [{"batch_name":"...", "test_paths":"..."}]'
        type: string
        required: true
      pythonpath-extra:
        description: "Extra dirs to add to PYTHONPATH (space-separated)"
        type: string
        default: ""
      catalog-compile-cmd:
        description: "Shell command to compile catalog (empty to skip)"
        type: string
        default: ""
      unit-pytest-flags:
        description: "Pytest flags for unit tests"
        type: string
        default: '-m "not integration and not ai" --timeout=120 --maxfail=50 --no-cov -o addopts="" -v --tb=short'
      integration-pytest-flags:
        description: "Pytest flags for integration tests"
        type: string
        default: '-v --tb=short --maxfail=100 --no-cov -o addopts="" -m "not ai"'
      firestore-port:
        type: string
        default: "8086"
      redis-port:
        type: string
        default: "6399"
      gcp-test-project:
        type: string
        default: "test-project"

jobs:
  unit-tests:
    name: "${{ matrix.set_name }}"
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(inputs.unit-test-matrix) }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Catalog bundle
        if: inputs.catalog-compile-cmd != ''
        run: |
          mkdir -p dist
          ${{ inputs.catalog-compile-cmd }} || true
          [ -f dist/catalog_bundle.json ] || echo '{"meta":{"catalog_version_id":"test","catalog_name":"test"},"tables":{}}' > dist/catalog_bundle.json
          cp dist/catalog_bundle.json dist/catalog_bundle_local.json || true
      - name: Start emulators
        uses: 1chrisshannon1-afk/SharedWorkflows/.github/actions/start-emulators@main
        with:
          firestore-port: ${{ inputs.firestore-port }}
          redis-port: ${{ inputs.redis-port }}
          gcp-project: ${{ inputs.gcp-test-project }}
      - name: Run tests
        run: |
          EXTRA="${{ inputs.pythonpath-extra }}"
          export PYTHONPATH="${GITHUB_WORKSPACE}${EXTRA:+:${GITHUB_WORKSPACE}/${EXTRA}}"
          [ -d dist ] && export CATALOG_DIR="${GITHUB_WORKSPACE}/modules/catalog_api_public/data/catalog_source" || true
          PATHS=""
          for p in ${{ matrix.test_paths }}; do
            [ -d "$p" ] && PATHS="$PATHS $p"
          done
          [ -z "$PATHS" ] && echo "No test dirs found, skipping." && exit 0
          pytest $PATHS ${{ inputs.unit-pytest-flags }} \
            --junitxml=test-results-${{ matrix.set_name }}.xml
        env:
          DEV_MODE: "true"
          SKIP_AUTH: "true"
          ENABLE_LICENSING: "false"
          APP_ENV: test
          GOOGLE_CLOUD_PROJECT: ${{ inputs.gcp-test-project }}
          FIRESTORE_EMULATOR_HOST: "localhost:${{ inputs.firestore-port }}"
          REDIS_URL: "redis://localhost:${{ inputs.redis-port }}/0"
          USE_CLOUD_DATA: "false"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.set_name }}
          path: test-results-*.xml

  integration-tests:
    name: "${{ matrix.batch_name }}"
    runs-on: ubuntu-latest
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(inputs.integration-test-matrix) }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Catalog bundle
        if: inputs.catalog-compile-cmd != ''
        run: |
          mkdir -p dist
          ${{ inputs.catalog-compile-cmd }} || true
          [ -f dist/catalog_bundle.json ] || echo '{"meta":{"catalog_version_id":"test","catalog_name":"test"},"tables":{}}' > dist/catalog_bundle.json
          cp dist/catalog_bundle.json dist/catalog_bundle_local.json || true
      - name: Start emulators
        uses: 1chrisshannon1-afk/SharedWorkflows/.github/actions/start-emulators@main
        with:
          firestore-port: ${{ inputs.firestore-port }}
          redis-port: ${{ inputs.redis-port }}
          gcp-project: ${{ inputs.gcp-test-project }}
      - name: Run integration tests
        run: |
          EXTRA="${{ inputs.pythonpath-extra }}"
          export PYTHONPATH="${GITHUB_WORKSPACE}${EXTRA:+:${GITHUB_WORKSPACE}/${EXTRA}}"
          [ -d dist ] && export CATALOG_DIR="${GITHUB_WORKSPACE}/modules/catalog_api_public/data/catalog_source" || true
          PATHS=""
          for p in ${{ matrix.test_paths }}; do
            [ -d "$p" ] && PATHS="$PATHS $p"
          done
          [ -z "$PATHS" ] && echo "No test dirs found, skipping." && exit 0
          pytest $PATHS ${{ inputs.integration-pytest-flags }} \
            --junitxml=test-results-${{ matrix.batch_name }}.xml
        env:
          DEV_MODE: "true"
          SKIP_AUTH: "false"
          ENABLE_LICENSING: "true"
          APP_ENV: test
          GOOGLE_CLOUD_PROJECT: ${{ inputs.gcp-test-project }}
          FIRESTORE_EMULATOR_HOST: "localhost:${{ inputs.firestore-port }}"
          REDIS_URL: "redis://localhost:${{ inputs.redis-port }}/0"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.batch_name }}
          path: test-results-*.xml
