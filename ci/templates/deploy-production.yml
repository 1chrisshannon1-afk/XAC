# deploy-production.yml — <PROJECT NAME>
# Replace all <PLACEHOLDER> values with project-specific values.
# DO NOT copy the reusable workflow logic here — use `uses:` only.
# This file is a template for onboarding; the other agent owns CI workflows.
# Recommended: canary-percentage 10, canary-bake-minutes 20, run-migrations only when needed.

name: Deploy Production
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      reason:
        required: false
        default: ''

permissions:
  contents: read
  id-token: write
  security-events: write

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  build:
    # ... (same pattern as deploy-staging: preflight, scans, static-checks, tests, then build)
    # Omitted for brevity; copy from deploy-staging template and add deploy-production job below.
    uses: 1chrisshannon1-afk/IAC/.github/workflows/reusable-build-push.yml@main
    with:
      project-id: <PROJECT_ID>
      repo-name: <ARTIFACT_REGISTRY_REPO>
      service-name: <CLOUD_RUN_SERVICE>
    secrets: inherit

  deploy:
    needs: build
    uses: 1chrisshannon1-afk/IAC/.github/workflows/reusable-deploy-production.yml@main
    with:
      project-id: <PROJECT_ID>
      service-name: <CLOUD_RUN_SERVICE>
      image-uri: ${{ needs.build.outputs.image-uri }}
      revision-suffix: ${{ github.sha }}
      playwright-dir: "<PATH OR EMPTY STRING>"
      run-migrations: false
      migration-command: ""
      canary-percentage: 10
      canary-bake-minutes: 20
      error-rate-threshold: 1
    secrets: inherit
