# CI emulator stack: Firestore, GCS, Redis
# Usage: docker compose -f docker-compose.ci.yml up -d --wait
services:
  firestore-emulator:
    image: google/cloud-sdk:emulators
    command: >
      bash -c "gcloud emulators firestore start --host-port=0.0.0.0:8086 --project=contractorscope-ai-test"
    ports:
      - "8086:8086"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import socket; s=socket.socket(); s.settimeout(2); s.connect(('localhost',8086)); s.close()\" || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 30s

  gcs-emulator:
    image: fsouza/fake-gcs-server:latest
    command: ["-scheme", "http", "-port", "9023", "-external-url", "http://localhost:9023"]
    ports:
      - "9023:9023"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9023/storage/v1/b || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6399:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
